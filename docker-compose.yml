version: "3.9"

services:

  # ── Postgres for CyberCare ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: cybercare-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cybercare
      POSTGRES_PASSWORD: cybercare123
      POSTGRES_DB: cybercare
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybercare"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cybercare-net

  # ── Postgres for SQLi Lab (unchanged) ──────────────────────────────
  sqli_db:
    image: postgres:15-alpine
    container_name: sqli_lab_db
    environment:
      POSTGRES_USER: lab_user
      POSTGRES_PASSWORD: lab_password
      POSTGRES_DB: sqli_lab
    ports:
      - "5433:5432"
    networks:
      - cybercare-net

  # pcl_db removed — PCL tables now live in the main cybercare DB.
  # This eliminates cross-database FK violations entirely.

  # ── Kali for Smart Analyzer (always running) ────────────────────────
  cybercare-kali:
    image: kalilinux/kali-rolling
    container_name: cybercare-kali
    restart: unless-stopped
    entrypoint: >
      sh -c "
        apt-get update -qq &&
        apt-get install -y -qq nmap nikto curl &&
        echo 'Kali ready' &&
        tail -f /dev/null
      "
    networks:
      - cybercare-net

  # ── Unified FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cybercare-backend
    restart: unless-stopped
    environment:
      PORT: 8000
      DATABASE_URL: postgresql://cybercare:cybercare123@db:5432/cybercare
      SQLI_DATABASE_URL: postgresql://lab_user:lab_password@sqli_db:5432/sqli_lab
      PCL_DATABASE_URL: postgresql://cybercare:cybercare123@db:5432/cybercare
      KALI_CONTAINER_NAME: cybercare-kali
      LAB_IMAGE_NAME: lab_runtime
      SECRET_KEY: e480d2405f8ccbc849281d3ca2c96da808cf9505a9d1f253bf414639f78048a2
      ACCESS_TOKEN_EXPIRE_MINUTES: 180
      SQLI_SECRET_KEY: 8c193135a62706ab713b026f41db24df9b6e163b7a2938766e3db6c1a013765f
      WORDLIST_DIR: /app
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      cybercare-kali:
        condition: service_started
    networks:
      - cybercare-net

networks:
  cybercare-net:
    driver: bridge

volumes:
  postgres_data: